name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the v prefix"
        required: true
        default: "1.1.18"
        type: string
      build_number:
        description: "Optional monotonically increasing CFBundleVersion"
        required: false
        type: string
      prerelease:
        description: "Publish as a GitHub prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      build_number: ${{ steps.metadata.outputs.build_number }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          RUN_NUMBER: ${{ github.run_number }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${REF_NAME}"
            version="${tag#v}"
            if [[ "${version}" == *-* ]]; then
              prerelease=true
            else
              prerelease=false
            fi
          else
            version="${INPUT_VERSION#v}"
            tag="v${version}"
            prerelease="${INPUT_PRERELEASE:-false}"
          fi
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${version}" >&2
            exit 2
          fi
          build_number="${INPUT_BUILD_NUMBER:-${RUN_NUMBER}}"
          if [[ ! "${build_number}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid build number: ${build_number}" >&2
            exit 2
          fi
          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "build_number=${build_number}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

  verify:
    name: Verify source and tests
    needs: prepare
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Typecheck and link all products
        shell: zsh {0}
        run: ./scripts/typecheck.sh

      - name: Run unit tests
        shell: zsh {0}
        run: ./scripts/test-direct.sh

      - name: Run integration tests
        shell: zsh {0}
        run: ./scripts/integration-test.sh

  release:
    name: Sign, notarize, and publish
    needs: [prepare, verify]
    runs-on: macos-15
    timeout-minutes: 60
    environment:
      name: release
      url: ${{ steps.publish.outputs.release_url }}
    permissions:
      contents: write
    env:
      MCLASH_VERSION: ${{ needs.prepare.outputs.version }}
      MCLASH_RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      MCLASH_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
      MCLASH_RELEASE_NOTES: ${{ github.workspace }}/ReleaseNotes/${{ needs.prepare.outputs.version }}.md
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag
        shell: zsh {0}
        run: |
          set -euo pipefail
          tag_ref="refs/tags/${MCLASH_RELEASE_TAG}"
          git show-ref --verify --quiet "${tag_ref}" || {
            print -u2 "Release tag does not exist: ${MCLASH_RELEASE_TAG}"
            print -u2 "Push the tag first; pushing it is the release approval."
            exit 1
          }
          tag_commit="$(git rev-list -n 1 "${tag_ref}")"
          checked_out_commit="$(git rev-parse HEAD)"
          if [[ "${tag_commit}" != "${checked_out_commit}" ]]; then
            print -u2 "Checked-out commit ${checked_out_commit} does not match ${MCLASH_RELEASE_TAG} (${tag_commit})."
            exit 1
          fi

      - name: Verify Apple Silicon runner
        shell: zsh {0}
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]] || {
            print -u2 "MClash currently requires an arm64 release runner."
            exit 1
          }

      - name: Require release credentials
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MCLASH_HOST_DEVID_PROFILE: ${{ secrets.MCLASH_HOST_DEVID_PROFILE }}
          MCLASH_NETWORK_EXTENSION_DEVID_PROFILE: ${{ secrets.MCLASH_NETWORK_EXTENSION_DEVID_PROFILE }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          for name in \
            CSC_LINK \
            CSC_KEY_PASSWORD \
            SPARKLE_PRIVATE_KEY \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID \
            MCLASH_HOST_DEVID_PROFILE \
            MCLASH_NETWORK_EXTENSION_DEVID_PROFILE
          do
            value="${(P)name:-}"
            if [[ -z "${value}" ]]; then
              print -u2 "Required release secret is unavailable: ${name}"
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        id: certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          certificate_path="${RUNNER_TEMP}/mclash-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/mclash-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          certificate_data="${CSC_LINK}"
          if [[ "${certificate_data}" == data:*base64,* ]]; then
            certificate_data="${certificate_data#*,}"
          fi
          printf '%s' "${certificate_data}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${CSC_KEY_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}" >/dev/null
          security list-keychains -d user -s "${keychain_path}"
          identity="$(security find-identity -v -p codesigning "${keychain_path}" | \
            sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "${identity}" ]]; then
            print -u2 "CSC_LINK does not contain a valid Developer ID Application identity."
            security find-identity -v -p codesigning "${keychain_path}"
            exit 1
          fi
          identity_record="$(security find-identity -v -p codesigning "${keychain_path}" | \
            sed -n '/"Developer ID Application:/{p;q;}')"
          if [[ ! "${identity_record}" =~ '([0-9A-Fa-f]{40}) "([^"]+)"' ]]; then
            print -u2 "Could not determine the Developer ID certificate fingerprint."
            exit 1
          fi
          certificate_sha1="${match[1]:u}"
          print "Using ${identity}"
          {
            print "CODE_SIGN_IDENTITY=${identity}"
            print "MCLASH_CERTIFICATE_SHA1=${certificate_sha1}"
            print "MCLASH_KEYCHAIN_PATH=${keychain_path}"
            print "MCLASH_CERTIFICATE_PATH=${certificate_path}"
          } >> "${GITHUB_ENV}"

      - name: Validate Developer ID provisioning profiles
        env:
          MCLASH_HOST_DEVID_PROFILE: ${{ secrets.MCLASH_HOST_DEVID_PROFILE }}
          MCLASH_NETWORK_EXTENSION_DEVID_PROFILE: ${{ secrets.MCLASH_NETWORK_EXTENSION_DEVID_PROFILE }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          umask 077

          signing_dir="${RUNNER_TEMP}/mclash-signing-material"
          mkdir -p "${signing_dir}"
          chmod 700 "${signing_dir}"
          host_profile="${signing_dir}/host.provisionprofile"
          extension_profile="${signing_dir}/network-extension.provisionprofile"
          host_plist="${signing_dir}/host-profile.plist"
          extension_plist="${signing_dir}/network-extension-profile.plist"
          host_entitlements="${GITHUB_WORKSPACE}/Support/Signing/MClash-DeveloperID.entitlements"
          extension_entitlements="${GITHUB_WORKSPACE}/Support/NetworkExtension/MClashNetworkExtension.DeveloperID.entitlements"

          decode_profile() {
            local encoded="$1"
            local destination="$2"
            if [[ "${encoded}" == data:*base64,* ]]; then
              encoded="${encoded#*,}"
            fi
            print -rn -- "${encoded}" | \
              LC_ALL=C tr -d '\r\n\t ' | \
              base64 --decode > "${destination}"
            if [[ ! -s "${destination}" ]]; then
              print -u2 "Decoded provisioning profile is empty: ${destination:t}"
              exit 1
            fi
          }

          plist_array_contains() {
            local plist="$1"
            local key="$2"
            local expected="$3"
            local index=0
            local value
            while value="$(/usr/libexec/PlistBuddy -c "Print :${key}:${index}" "${plist}" 2>/dev/null)"; do
              if [[ "${value}" == "${expected}" ]]; then
                return 0
              fi
              (( index += 1 ))
            done
            return 1
          }

          validate_profile() {
            local profile="$1"
            local decoded_plist="$2"
            local expected_bundle_id="$3"
            local requires_install_entitlement="$4"
            local team_identifier
            local application_identifier_prefix
            local application_identifier
            local entitlement_team_identifier
            local certificate_count
            local certificate_index
            local certificate_data
            local certificate_path
            local fingerprint
            local fingerprint_output
            local matching_certificate=0

            security cms -D -i "${profile}" -o "${decoded_plist}"
            plutil -lint "${decoded_plist}" >/dev/null
            team_identifier="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "${decoded_plist}")"
            application_identifier_prefix="$(/usr/libexec/PlistBuddy -c 'Print :ApplicationIdentifierPrefix:0' "${decoded_plist}")"
            application_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "${decoded_plist}")"
            entitlement_team_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.team-identifier' "${decoded_plist}")"
            if [[ "${team_identifier}" != "${APPLE_TEAM_ID}" || \
                  "${entitlement_team_identifier}" != "${APPLE_TEAM_ID}" ]]; then
              print -u2 "Provisioning profile ${profile:t} belongs to the wrong Apple team."
              exit 1
            fi
            if [[ -z "${application_identifier_prefix}" || \
                  "${application_identifier}" != "${application_identifier_prefix}.${expected_bundle_id}" ]]; then
              print -u2 "Provisioning profile ${profile:t} does not match ${expected_bundle_id}."
              exit 1
            fi
            for provider_type in \
              app-proxy-provider-systemextension \
              dns-proxy-systemextension
            do
              if ! plist_array_contains \
                "${decoded_plist}" \
                "Entitlements:com.apple.developer.networking.networkextension" \
                "${provider_type}"; then
                print -u2 "Provisioning profile ${profile:t} is missing ${provider_type}."
                exit 1
              fi
            done
            if [[ "${requires_install_entitlement}" == "1" ]] && \
               [[ "$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.system-extension.install' "${decoded_plist}" 2>/dev/null)" != "true" ]]; then
              print -u2 "The host profile does not authorize system extension installation."
              exit 1
            fi

            certificate_count="$(plutil -extract DeveloperCertificates raw -o - "${decoded_plist}")"
            for (( certificate_index = 0; certificate_index < certificate_count; certificate_index++ )); do
              certificate_data="$(plutil -extract "DeveloperCertificates.${certificate_index}" raw -o - "${decoded_plist}")"
              certificate_path="${signing_dir}/${profile:t}.${certificate_index}.cer"
              print -rn -- "${certificate_data}" | base64 --decode > "${certificate_path}"
              fingerprint_output="$(openssl x509 -inform DER -noout -fingerprint -sha1 -in "${certificate_path}")"
              fingerprint="${fingerprint_output#*=}"
              fingerprint="${fingerprint//:/}"
              fingerprint="${fingerprint:u}"
              rm -f "${certificate_path}"
              if [[ "${fingerprint}" == "${MCLASH_CERTIFICATE_SHA1}" ]]; then
                matching_certificate=1
                break
              fi
            done
            if [[ "${matching_certificate}" != "1" ]]; then
              print -u2 "Provisioning profile ${profile:t} does not authorize the imported signing certificate."
              exit 1
            fi
          }

          for entitlement_file in "${host_entitlements}" "${extension_entitlements}"; do
            plutil -lint "${entitlement_file}" >/dev/null
            for provider_type in \
              app-proxy-provider-systemextension \
              dns-proxy-systemextension
            do
              if ! plist_array_contains \
                "${entitlement_file}" \
                "com.apple.developer.networking.networkextension" \
                "${provider_type}"; then
                print -u2 "${entitlement_file:t} is missing ${provider_type}."
                exit 1
              fi
            done
          done
          if [[ "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.system-extension.install' "${host_entitlements}")" != "true" ]]; then
            print -u2 "Host Developer ID entitlements are missing system-extension.install."
            exit 1
          fi

          decode_profile "${MCLASH_HOST_DEVID_PROFILE}" "${host_profile}"
          decode_profile "${MCLASH_NETWORK_EXTENSION_DEVID_PROFILE}" "${extension_profile}"
          validate_profile "${host_profile}" "${host_plist}" "one.leaper.mclash" 1
          validate_profile \
            "${extension_profile}" \
            "${extension_plist}" \
            "one.leaper.mclash.network-extension" \
            0
          host_profile_application_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "${host_plist}")"
          extension_profile_application_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "${extension_plist}")"
          for identity_pair in \
            "${host_entitlements}|${host_profile_application_identifier}" \
            "${extension_entitlements}|${extension_profile_application_identifier}"
          do
            entitlement_file="${identity_pair%%|*}"
            expected_application_identifier="${identity_pair#*|}"
            if [[ "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.application-identifier' "${entitlement_file}" 2>/dev/null)" != "${expected_application_identifier}" ]] || \
               [[ "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.team-identifier' "${entitlement_file}" 2>/dev/null)" != "${APPLE_TEAM_ID}" ]]; then
              print -u2 "${entitlement_file:t} identity does not match its provisioning profile."
              exit 1
            fi
          done
          host_application_prefix="$(/usr/libexec/PlistBuddy -c 'Print :ApplicationIdentifierPrefix:0' "${host_plist}")"
          extension_application_prefix="$(/usr/libexec/PlistBuddy -c 'Print :ApplicationIdentifierPrefix:0' "${extension_plist}")"
          if [[ "${host_application_prefix}" != "${extension_application_prefix}" ]]; then
            print -u2 "Host and Network Extension profiles use different application identifier prefixes."
            exit 1
          fi
          app_group_identifier="${APPLE_TEAM_ID}.one.leaper.mclash"
          for entitlement_file in "${host_entitlements}" "${extension_entitlements}"; do
            if ! plist_array_contains \
              "${entitlement_file}" \
              "com.apple.security.application-groups" \
              "${app_group_identifier}"; then
              print -u2 "${entitlement_file:t} is missing macOS App Group ${app_group_identifier}."
              exit 1
            fi
          done

          {
            print "MCLASH_HOST_DEVID_PROFILE_PATH=${host_profile}"
            print "MCLASH_NETWORK_EXTENSION_DEVID_PROFILE_PATH=${extension_profile}"
            print "MCLASH_HOST_DEVID_ENTITLEMENTS=${host_entitlements}"
            print "MCLASH_NETWORK_EXTENSION_DEVID_ENTITLEMENTS=${extension_entitlements}"
            print "MCLASH_TEAM_IDENTIFIER_PREFIX=${host_application_prefix}."
            print "MCLASH_SIGNING_MATERIAL_DIR=${signing_dir}"
          } >> "${GITHUB_ENV}"

      - name: Build notarized release assets
        shell: zsh {0}
        run: |
          set -euo pipefail
          ./scripts/release-app.sh

      - name: Publish GitHub Release
        id: publish
        env:
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          source Support/mihomo-alpha.env
          release_dir=".build/releases/${MCLASH_VERSION}-${MCLASH_BUILD_NUMBER}"
          assets=(
            "${release_dir}/MClash-${MCLASH_VERSION}-macos-arm64.dmg"
            "${release_dir}/MClash-${MCLASH_VERSION}-macos-arm64.zip"
            "${release_dir}/appcast.xml"
            "${release_dir}/mihomo-${MIHOMO_ALPHA_REVISION}-source.tar.gz"
            "${release_dir}/Sparkle-2.9.4-LICENSE.txt"
            "${release_dir}/SHA256SUMS"
          )
          prerelease_args=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "${MCLASH_RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${MCLASH_RELEASE_TAG}" "${assets[@]}" --clobber
            gh release edit "${MCLASH_RELEASE_TAG}" \
              --title "MClash ${MCLASH_VERSION}" \
              --notes-file "${MCLASH_RELEASE_NOTES}" \
              "${prerelease_args[@]}"
          else
            gh release create "${MCLASH_RELEASE_TAG}" "${assets[@]}" \
              --title "MClash ${MCLASH_VERSION}" \
              --notes-file "${MCLASH_RELEASE_NOTES}" \
              "${prerelease_args[@]}"
          fi
          release_url="$(gh release view "${MCLASH_RELEASE_TAG}" --json url --jq .url)"
          print "release_url=${release_url}" >> "${GITHUB_OUTPUT}"

      - name: Upload diagnostic copy of release assets
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MClash-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.build_number }}
          path: .build/releases/${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.build_number }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Remove temporary signing material
        if: always()
        shell: zsh {0}
        run: |
          set +e
          keychain_path="${MCLASH_KEYCHAIN_PATH:-${RUNNER_TEMP}/mclash-signing.keychain-db}"
          certificate_path="${MCLASH_CERTIFICATE_PATH:-${RUNNER_TEMP}/mclash-developer-id.p12}"
          signing_dir="${MCLASH_SIGNING_MATERIAL_DIR:-${RUNNER_TEMP}/mclash-signing-material}"
          if [[ "${keychain_path}" == "${RUNNER_TEMP}"/* && -f "${keychain_path}" ]]; then
            security delete-keychain "${keychain_path}"
          fi
          if [[ "${certificate_path}" == "${RUNNER_TEMP}"/* && -f "${certificate_path}" ]]; then
            rm -f "${certificate_path}"
          fi
          if [[ "${signing_dir}" == "${RUNNER_TEMP}"/* && -d "${signing_dir}" ]]; then
            find "${signing_dir}" -type f -delete
            rmdir "${signing_dir}"
          fi
