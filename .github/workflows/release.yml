name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the v prefix"
        required: true
        default: "1.0.0"
        type: string
      build_number:
        description: "Optional monotonically increasing CFBundleVersion"
        required: false
        type: string
      prerelease:
        description: "Publish as a GitHub prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Test release source
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      build_number: ${{ steps.metadata.outputs.build_number }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release metadata
        id: metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          RUN_NUMBER: ${{ github.run_number }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${REF_NAME}"
            version="${tag#v}"
            prerelease="$([[ "${version}" == *-* ]] && print true || print false)"
          else
            version="${INPUT_VERSION#v}"
            tag="v${version}"
            prerelease="${INPUT_PRERELEASE:-false}"
          fi
          if [[ ! "${version}" =~ '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' ]]; then
            print -u2 "Invalid release version: ${version}"
            exit 2
          fi
          build_number="${INPUT_BUILD_NUMBER:-${RUN_NUMBER}}"
          if [[ ! "${build_number}" =~ '^[1-9][0-9]*$' ]]; then
            print -u2 "Invalid build number: ${build_number}"
            exit 2
          fi
          {
            print "version=${version}"
            print "tag=${tag}"
            print "build_number=${build_number}"
            print "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify Apple Silicon runner
        shell: zsh {0}
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]] || {
            print -u2 "MClash currently requires an arm64 release runner."
            exit 1
          }

      - name: Run strict compiler checks and tests
        shell: zsh {0}
        run: |
          set -euo pipefail
          ./scripts/typecheck.sh
          ./scripts/test-direct.sh

  release:
    name: Sign, notarize, and publish
    needs: test
    runs-on: macos-15
    timeout-minutes: 60
    environment:
      name: release
      url: ${{ steps.publish.outputs.release_url }}
    permissions:
      contents: write
    env:
      MCLASH_VERSION: ${{ needs.test.outputs.version }}
      MCLASH_RELEASE_TAG: ${{ needs.test.outputs.tag }}
      MCLASH_BUILD_NUMBER: ${{ needs.test.outputs.build_number }}
      MCLASH_RELEASE_NOTES: ${{ github.workspace }}/ReleaseNotes/${{ needs.test.outputs.version }}.md
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require release credentials
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          for name in CSC_LINK CSC_KEY_PASSWORD SPARKLE_PRIVATE_KEY APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            value="${(P)name:-}"
            if [[ -z "${value}" ]]; then
              print -u2 "Required release secret is unavailable: ${name}"
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        id: certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          certificate_path="${RUNNER_TEMP}/mclash-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/mclash-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          certificate_data="${CSC_LINK}"
          if [[ "${certificate_data}" == data:*base64,* ]]; then
            certificate_data="${certificate_data#*,}"
          fi
          printf '%s' "${certificate_data}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${CSC_KEY_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}" >/dev/null
          security list-keychains -d user -s "${keychain_path}"
          identity="$(security find-identity -v -p codesigning "${keychain_path}" | \
            sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "${identity}" ]]; then
            print -u2 "CSC_LINK does not contain a valid Developer ID Application identity."
            security find-identity -v -p codesigning "${keychain_path}"
            exit 1
          fi
          print "Using ${identity}"
          {
            print "CODE_SIGN_IDENTITY=${identity}"
            print "MCLASH_KEYCHAIN_PATH=${keychain_path}"
            print "MCLASH_CERTIFICATE_PATH=${certificate_path}"
          } >> "${GITHUB_ENV}"

      - name: Build notarized release assets
        shell: zsh {0}
        run: |
          set -euo pipefail
          ./scripts/release-app.sh

      - name: Publish GitHub Release
        id: publish
        env:
          PRERELEASE: ${{ needs.test.outputs.prerelease }}
          TARGET_SHA: ${{ github.sha }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          source Support/mihomo-alpha.env
          release_dir=".build/releases/${MCLASH_VERSION}-${MCLASH_BUILD_NUMBER}"
          assets=(
            "${release_dir}/MClash-${MCLASH_VERSION}-macos-arm64.dmg"
            "${release_dir}/MClash-${MCLASH_VERSION}-macos-arm64.zip"
            "${release_dir}/appcast.xml"
            "${release_dir}/mihomo-${MIHOMO_ALPHA_REVISION}-source.tar.gz"
            "${release_dir}/Sparkle-2.9.4-LICENSE.txt"
            "${release_dir}/SHA256SUMS"
          )
          prerelease_args=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "${MCLASH_RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${MCLASH_RELEASE_TAG}" "${assets[@]}" --clobber
            gh release edit "${MCLASH_RELEASE_TAG}" \
              --title "MClash ${MCLASH_VERSION}" \
              --notes-file "${MCLASH_RELEASE_NOTES}" \
              "${prerelease_args[@]}"
          else
            gh release create "${MCLASH_RELEASE_TAG}" "${assets[@]}" \
              --target "${TARGET_SHA}" \
              --title "MClash ${MCLASH_VERSION}" \
              --notes-file "${MCLASH_RELEASE_NOTES}" \
              "${prerelease_args[@]}"
          fi
          release_url="$(gh release view "${MCLASH_RELEASE_TAG}" --json url --jq .url)"
          print "release_url=${release_url}" >> "${GITHUB_OUTPUT}"

      - name: Upload diagnostic copy of release assets
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MClash-${{ needs.test.outputs.version }}-${{ needs.test.outputs.build_number }}
          path: .build/releases/${{ needs.test.outputs.version }}-${{ needs.test.outputs.build_number }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Remove temporary signing material
        if: always()
        shell: zsh {0}
        run: |
          set +e
          if [[ -n "${MCLASH_KEYCHAIN_PATH:-}" && -f "${MCLASH_KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${MCLASH_KEYCHAIN_PATH}"
          fi
          if [[ -n "${MCLASH_CERTIFICATE_PATH:-}" && -f "${MCLASH_CERTIFICATE_PATH}" ]]; then
            rm -f "${MCLASH_CERTIFICATE_PATH}"
          fi
